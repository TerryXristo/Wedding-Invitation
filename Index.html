<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Terry & Olivia</title>

```
<link rel="stylesheet" href="chatterbox.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
```

</head>
<body>

```
<div class="background-glow"></div>

<main class="scene">

    <div class="chatterbox-container">

        <div class="chatterbox closed" id="chatterbox">

            <!-- OUTER FLAPS -->

            <div class="outer-flap outer-top">
                <span>Terry</span>
            </div>

            <div class="outer-flap outer-right">
                <span>&</span>
            </div>

            <div class="outer-flap outer-bottom">
                <span>Olivia</span>
            </div>

            <div class="outer-flap outer-left">
                <span>2027</span>
            </div>

            <!-- INNER FLAPS -->

            <div class="inner-flap inner-top">
                <span>When</span>
            </div>

            <div class="inner-flap inner-right">
                <span>Where</span>
            </div>

            <div class="inner-flap inner-bottom">
                <span>Dress</span>
            </div>

            <div class="inner-flap inner-left">
                <span>RSVP</span>
            </div>

        </div>

    </div>

    <!-- INVITATION -->

    <section class="invitation-card" id="invitation">

        <p class="eyebrow">
            You're invited to the wedding of
        </p>

        <h1>
            Terry &amp; Olivia
        </h1>

        <div class="divider"></div>

        <p class="details">
            4:00pm Saturday, May 8 2027
        </p>

        <p class="venue">
            The Gallery at Alpha
        </p>

        <a class="rsvp-button" href="#">
            RSVP
        </a>

    </section>

    <p class="instruction" id="instruction">
        Click to open
    </p>

</main>

<script src="script.js"></script>
```

</body>
</html>
